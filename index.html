<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/main.min.css" />
    <title>Frontend Mentor | Todo app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="main">
      <section class="main__img-bg">
        <div class="form-container">
          <h1 class="heading">Todo</h1>
          <div class="icon-div">
            <img class="mode-icon" src="/images/icon-sun.svg" alt="" />
          </div>
          <form class="form">
            <input
              class="form__input"
              type="text"
              placeholder="Create a new todo..."
              onfocus="this.placeholder = ''"
              onblur="this.placeholder = 'Create a new todo...'"
            />
          </form>
        </div>
      </section>
      <section class="one-color-bg">
        <div class="one-color-bg__list" style="display: none">
          <ul class="todo-items">
            <!-- <li class="todo-items__item">
              <div class="field-group">
                <input type="checkbox" name="checkbox" class="checkbox-field" />
                <label for="reading" class="checkbox-label"></label>
              </div>
              <p>Walk dog</p>
              <span class="close-btn"
                ><img src="/images/icon-cross.svg" alt=""
              /></span>
            </li>
            <li class="todo-items__item">
              <div class="field-group">
                <input type="checkbox" name="checkbox" class="checkbox-field" />
                <label for="reading" class="checkbox-label"></label>
              </div>
              <p>Walk dog</p>
              <span class="close-btn"
                ><img src="/images/icon-cross.svg" alt=""
              /></span>
            </li> -->
          </ul>
          <div class="list-footer">
            <div class="left">
              <p class="left__items">
                <span class="num-of-items-left">0</span> Items Left
              </p>
            </div>
            <div class="select">
              <p class="select-items select__all active">All</p>
              <p class="select-items select__active">Active</p>
              <p class="select-items select__completed">Completed</p>
            </div>
            <div class="clear">
              <p class="clear__completed">Clear Completed</p>
            </div>
          </div>
        </div>
        <!-- <div class="drag-and-drop-msg">
          <p>Drag and drop to reorder list</p>
        </div> -->
      </section>
    </main>
    <!-- Add dynamic number -->
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
