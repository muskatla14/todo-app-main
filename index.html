<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="css/main.min.css" />
    <title>Frontend Mentor | Todo app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="main">
      <section class="img-bg">
        <div class="form-container">
          <h1>Todo</h1>
          <img src="/images/icon-sun.svg" alt="" />
          <form>
            <input class="input" type="text" placeholder="Create a new todo" />
          </form>
        </div>
      </section>
      <section class="one-color-bg">
        <div class="one-color-bg__list">
          <ul class="todo-items">
            <li class="todo-items__item">
              <img src="/images/icon-check.svg" alt="" />
              <p>Walk dog</p>
              <img src="/images/icon-cross.svg" alt="" />
            </li>
            <li class="todo-items__item">
              <img src="/images/icon-check.svg" alt="" />
              <p>Walk dog</p>
              <img src="/images/icon-cross.svg" alt="" />
            </li>
            <li class="todo-items__item">
              <img src="/images/icon-check.svg" alt="" />
              <p>Walk dog</p>
              <img src="/images/icon-cross.svg" alt="" />
            </li>
            <li class="todo-items__item">
              <img src="/images/icon-check.svg" alt="" />
              <p>Walk dog</p>
              <img src="/images/icon-cross.svg" alt="" />
            </li>
          </ul>
          <div class="list-footer">
            <div class="left">
              <p class="left__items">Items Left</p>
            </div>
            <div class="select">
              <p class="select__all">All</p>
              <p class="select__active">Active</p>
              <p class="select__completed">Completed</p>
            </div>
            <div class="clear">
              <p class="clear__completed">Clear Completed</p>
            </div>
          </div>
        </div>
        <div class="one-color-bg__footer">
          <p>Drag and drop to reorder list</p>
        </div>
      </section>
    </main>

    <!-- Add dynamic number -->
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
